# Leagues Task Tracker — personal account progression across ALL regions.
#
# Unlike an actual League (where you pick only a few regions), this tracks every
# region at once, so the whole task list is always in scope.
#
# FORMAT
#   Region:                 <- no indentation, ends with ':'
#     easy:                 <- 2-space indent, one of: easy / medium / hard / elite / master
#       - Task description           <- not done
#       - Task description | done    <- done, no date
#       - Task description | done 2026-01-15   <- done, with date
#
# Points per tier: Easy 10, Medium 40, Hard 80, Elite 150, Master 500.
#
# This is a STARTER set — expand each region from the OSRS Wiki Leagues task
# tables (https://oldschool.runescape.wiki/w/Trailblazer_Reloaded_League/Tasks).


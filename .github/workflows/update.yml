name: Update OSRS Stats

on:
  schedule:
    - cron: '0 */6 * * *'   # Every 6 hours
  workflow_dispatch:        # Manual trigger
  push:
    paths:
      - 'data/*.yaml'
      - 'data/bank.txt'
      - 'index.html'
      - 'styles.css'
      - 'app.js'
      - 'scripts/**.py'
      - 'pyproject.toml'
      - 'tests/**.py'
      - '.github/workflows/update.yml'

# Prevent duplicate runs
concurrency:
  group: update-stats
  cancel-in-progress: false

# Required for Pages deployment
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # Lint + unit tests. Deployment depends on this so we never publish broken code.
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dev tools
        run: pip install ruff pytest

      - name: Ruff lint
        run: ruff check scripts tests

      - name: Run tests
        run: pytest -q

  update-and-deploy:
    runs-on: ubuntu-latest
    needs: lint-and-test
    # Skip if triggered by bot's own commit
    if: github.actor != 'github-actions[bot]'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run update scripts
        env:
          RSN: FoolinSlays
        run: |
          python scripts/update_stats.py
          # update_bank.py is intentionally NOT run in CI:
          # bank.txt is private (gitignored) so it can't produce real bank data
          # here, and bank.json is kept local-only. Run it locally instead.

      - name: Validate generated data
        run: python scripts/validate_data.py

      - name: Suggest new drops (log only)
        run: python scripts/suggest_drops.py

      - name: Commit data changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/
          git diff --staged --quiet || git commit -m "Update stats $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push

      - name: Stage Pages artifact
        run: |
          mkdir -p _site/data
          cp index.html _site/
          cp styles.css _site/
          cp app.js _site/
          cp data/*.json _site/data/ 2>/dev/null || true
          cp data/*.yaml _site/data/ 2>/dev/null || true
          # Private wealth data — never publish it to the live site
          rm -f _site/data/bank.json _site/data/potion_storage.json _site/data/potion_storage.yaml _site/data/seed_vault.json

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
